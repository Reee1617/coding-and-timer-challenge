
<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Tasks</title>
</head>

<body>

    <h2>JavaScript Assignment Tasks</h2>

    
    <h3>Task 1: Second Largest Number</h3>


    <h3>Task 2: Unique Elements</h3>

    
    <h3>Task 3: Student Score Analysis</h3>

    <script>
        /* 
           Task 1: Find Second Largest Number
         */
        const numbers = [23, 45, 67, 89, 12, 90, 44];

        let largest = -Infinity;
        let secondLargest = -Infinity;

        numbers.forEach(num => {
            if (num > largest) {
                secondLargest = largest;
                largest = num;
            } else if (num > secondLargest && num !== largest) {
                secondLargest = num;
            }
        });

        console.log("Task 1 - Second Largest:", secondLargest);
        document.write("Task 1 - Second Largest Number: " + secondLargest + "<br><br>");

        /* 
           Task 2: Return Unique Elements
         */
        const array1 = [1, 2, 3, 4];
        const array2 = [3, 4, 5, 6];

        function getUniqueElements(arr1, arr2) {
            return [...new Set([...arr1, ...arr2])];
        }

        const uniqueElements = getUniqueElements(array1, array2);

        console.log("Task 2 - Unique Elements:", uniqueElements);
        document.write("Task 2 - Unique Elements: " + uniqueElements.join(", ") + "<br><br>");

        /* 
           Task 3: Student Score Analysis
         */
        let students = [
            { name: 'Alice', age: 22, scores: [78, 85, 92] },
            { name: 'Bob', age: 20, scores: [88, 90, 76] },
            { name: 'Charlie', age: 21, scores: [95, 80, 85] }
        ];

        let topStudent = "";
        let highestAverage = 0;

        students.forEach(student => {
            let total = 0;

            student.scores.forEach(score => {
                total += score;
            });

            let average = total / student.scores.length;

            if (average > highestAverage) {
                highestAverage = average;
                topStudent = student.name;
            }
        });

        console.log(
            `Task 3 - Top Student: ${topStudent} (${highestAverage.toFixed(2)})`
        );

        document.write(
            `Task 3 - Top Student: ${topStudent} with an average score of ${highestAverage.toFixed(2)}`
        );
    </script>

</body>
</html>
